<!DOCTYPE html>
<html lang="pt-BR">
<head>

<script>
  window.pixelId = "6a0fb50302a1b599b36920ba";

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Primacial · Descubra Seu Kit</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --dark: #111111;
    --card: #161616;
    --border: #2a2a2a;
    --gold: #c9a96e;
    --gold-light: #e8cfa0;
    --gold-dim: rgba(201,169,110,0.15);
    --white: #f5f0ea;
    --muted: #777;
    --red: #c0392b;
    --green: #1e8c45;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 60px;
  }

  /* ── HEADER ── */
  header {
    width: 100%;
    max-width: 520px;
    padding: 20px 20px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
  }

  /* ── PROGRESS ── */
  .progress-wrap {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
    height: 38px;
    display: flex;
    align-items: center;
  }

  .progress-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: linear-gradient(90deg, #a07840, var(--gold));
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    border-radius: 2px;
  }

  .progress-label {
    position: relative;
    z-index: 2;
    width: 100%;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--black);
    text-shadow: none;
  }
  .progress-label.light { color: var(--gold); }

  /* ── MAIN CARD ── */
  .main-card {
    width: 100%;
    max-width: 520px;
    margin-top: 18px;
    padding: 0 20px;
  }

  /* ── BANNER ── */
  .banner {
    width: 100%;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 24px;
    position: relative;
    background: linear-gradient(135deg, #1a1510 0%, #0f0d0a 100%);
    min-height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
  }

  .banner-glow {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(201,169,110,0.13) 0%, transparent 70%);
  }

  .banner-content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 32px 24px;
  }

  .banner-icon { font-size: 48px; margin-bottom: 12px; display: block; }

  .banner-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.05em;
    line-height: 1.15;
    margin-bottom: 8px;
  }

  .banner-sub {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    max-width: 340px;
  }

  /* ── QUESTION ── */
  .question-block { margin-bottom: 20px; }

  .question-step {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .question-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    line-height: 1.3;
    color: var(--white);
    margin-bottom: 6px;
  }

  .question-obs {
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
    margin-bottom: 20px;
    padding: 10px 14px;
    border-left: 2px solid var(--gold);
    background: var(--gold-dim);
    border-radius: 0 2px 2px 0;
    line-height: 1.5;
  }

  /* ── OPTIONS ── */
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 24px;
  }

  .option-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 18px 14px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    -webkit-tap-highlight-color: transparent;
  }
  .option-btn:hover {
    border-color: var(--gold);
    background: #1c1a14;
    transform: translateY(-2px);
  }
  .option-btn.selected {
    border-color: var(--gold);
    background: linear-gradient(135deg, #1c1a14, #201e14);
    box-shadow: 0 0 0 1px var(--gold);
  }
  .option-btn.selected .opt-icon { transform: scale(1.15); }

  .opt-icon { font-size: 26px; line-height: 1; transition: transform 0.2s; }
  .opt-text {
    font-size: 13px;
    font-weight: 500;
    color: var(--white);
    line-height: 1.4;
  }

  /* ── NEXT BTN ── */
  .btn-next {
    width: 100%;
    background: var(--gold);
    color: var(--black);
    border: none;
    padding: 18px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.3s;
    margin-bottom: 10px;
    opacity: 0.4;
    pointer-events: none;
  }
  .btn-next.active {
    opacity: 1;
    pointer-events: all;
  }
  .btn-next.active:hover {
    background: var(--gold-light);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(201,169,110,0.3);
  }

  .btn-obs {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 13px;
    font-size: 12px;
    letter-spacing: 0.08em;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.2s;
    margin-bottom: 28px;
  }
  .btn-obs:hover { border-color: var(--gold); color: var(--gold); }

  /* ── RESULT PAGE ── */
  #result-page { display: none; width: 100%; max-width: 520px; padding: 0 20px; }

  .result-banner {
    width: 100%;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 24px;
    background: linear-gradient(135deg, #1a1510, #0f0d0a);
    border: 1px solid var(--gold);
    position: relative;
    text-align: center;
    padding: 48px 28px;
  }
  .result-banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(201,169,110,0.15) 0%, transparent 70%);
  }

  .confetti-row {
    font-size: 32px;
    letter-spacing: 6px;
    margin-bottom: 16px;
    position: relative;
    z-index: 2;
    animation: bounceIn 0.6s ease;
  }
  @keyframes bounceIn {
    0% { transform: scale(0.5); opacity: 0; }
    70% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }

  .result-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.05em;
    position: relative;
    z-index: 2;
    margin-bottom: 8px;
    animation: fadeUp 0.5s 0.2s both;
  }
  .result-sub {
    font-size: 14px;
    color: var(--muted);
    position: relative;
    z-index: 2;
    animation: fadeUp 0.5s 0.35s both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-message {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--gold);
    padding: 20px 20px;
    margin-bottom: 20px;
    border-radius: 0 4px 4px 0;
    animation: fadeUp 0.5s 0.4s both;
  }
  .result-message p {
    font-size: 14px;
    color: var(--white);
    line-height: 1.75;
  }
  .result-message strong { color: var(--gold); }

  .result-kit {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px 20px;
    margin-bottom: 20px;
    animation: fadeUp 0.5s 0.5s both;
  }
  .kit-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
  }
  .kit-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--white);
    margin-bottom: 6px;
  }
  .kit-frags {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 18px;
  }
  .kit-price-old {
    font-size: 13px;
    color: var(--muted);
    text-decoration: line-through;
    margin-bottom: 4px;
  }
  .kit-price {
    font-family: 'Cormorant Garamond', serif;
    font-size: 44px;
    font-weight: 600;
    color: var(--white);
    line-height: 1;
    margin-bottom: 4px;
  }
  .kit-price span { font-size: 20px; font-weight: 300; }
  .kit-install { font-size: 12px; color: var(--gold); }

  .btn-buy {
    display: block;
    width: 100%;
    background: var(--gold);
    color: var(--black);
    border: none;
    padding: 20px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.3s;
    text-decoration: none;
    text-align: center;
    margin-bottom: 10px;
    animation: fadeUp 0.5s 0.6s both;
  }
  .btn-buy:hover {
    background: var(--gold-light);
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(201,169,110,0.35);
  }

  .scarcity {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 32px;
    animation: fadeUp 0.5s 0.7s both;
  }
  .scarcity strong { color: #e07070; }

  /* ── COMMENTS ── */
  .comments-section {
    width: 100%;
    border-top: 1px solid var(--border);
    padding-top: 24px;
    margin-top: 8px;
  }

  .comments-header {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .comments-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .comment {
    display: flex;
    gap: 12px;
    margin-bottom: 18px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }
  .comment:last-child { border-bottom: none; }

  .avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2a2010, #1a1510);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .comment-body { flex: 1; }
  .comment-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--white);
    margin-bottom: 4px;
  }
  .comment-text {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 8px;
  }
  .comment-text strong { color: var(--gold); }

  .comment-reactions {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 12px;
    color: var(--muted);
  }
  .reaction {
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    transition: color 0.2s;
  }
  .reaction:hover { color: var(--gold); }
  .reaction-count { font-size: 11px; }
  .comment-time { font-size: 11px; color: #444; }

  /* ── QUIZ SCREEN TRANSITIONS ── */
  #quiz-page { width: 100%; }
  .screen { animation: fadeUp 0.4s ease both; }

  /* ── OBS MODAL ── */
  .obs-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 999;
    align-items: flex-end;
    justify-content: center;
  }
  .obs-overlay.open { display: flex; }

  .obs-sheet {
    background: var(--dark);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    padding: 28px 24px 40px;
    width: 100%;
    max-width: 520px;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .obs-sheet-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--gold);
    margin-bottom: 12px;
  }
  .obs-sheet-text {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 20px;
  }
  .obs-close {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--white);
    padding: 14px;
    font-size: 13px;
    cursor: pointer;
    border-radius: 3px;
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">Primacial</div>
  <div class="progress-wrap">
    <div class="progress-bar" id="progress-bar" style="width: 0%"></div>
    <div class="progress-label" id="progress-label">Iniciando...</div>
  </div>
</header>

<!-- CONTAINER DINÂMICO -->
<div id="app" class="main-card"></div>

<!-- OBS MODAL -->
<div class="obs-overlay" id="obs-modal" onclick="closeObs()">
  <div class="obs-sheet" onclick="event.stopPropagation()">
    <div class="obs-sheet-title" id="obs-title"></div>
    <p class="obs-sheet-text" id="obs-text"></p>
    <button class="obs-close" onclick="closeObs()">Entendi, fechar</button>
  </div>
</div>

<script>
  const TOTAL = 4;

  const questions = [
    {
      text: "Como você descreveria seu estilo no dia a dia?",
      obs: { title: "Sobre essa pergunta", text: "Seu estilo de vida influencia diretamente no tipo de fragrância que vai combinar com você. Perfis mais urbanos tendem a se identificar com o <strong style='color:var(--gold)'>Midtown</strong>, enquanto estilos mais intensos combinam com o <strong style='color:var(--gold)'>Enigma</strong>." },
      hint: "💡 Não existe resposta certa. Escolha a que mais combina com você agora.",
      options: [
        { icon: "👔", text: "Urbano e refinado" },
        { icon: "🏋️", text: "Ativo e moderno" },
        { icon: "🎩", text: "Clássico com atitude" },
        { icon: "🌍", text: "Livre e aventureiro" },
      ]
    },
    {
      text: "Em qual momento você mais usa fragrância?",
      obs: { title: "Sobre essa pergunta", text: "Cada fragrância do kit foi pensada para uma ocasião. O momento de uso nos ajuda a identificar qual das três você vai usar mais — e garantir que o kit completo faz sentido para a sua rotina." },
      hint: "🕐 Pense na sua rotina real — onde você quer causar mais impacto.",
      options: [
        { icon: "💼", text: "No trabalho e reuniões" },
        { icon: "🍷", text: "Em encontros e jantares" },
        { icon: "🌙", text: "Em festas e noites" },
        { icon: "☀️", text: "Durante todo o dia" },
      ]
    },
    {
      text: "Qual sensação você quer transmitir?",
      obs: { title: "Sobre essa pergunta", text: "A sensação que você quer transmitir é a essência da escolha olfativa. <strong style='color:var(--gold)'>Barbarius</strong> é fresco e vibrante, <strong style='color:var(--gold)'>Midtown</strong> é elegante, e <strong style='color:var(--gold)'>Enigma</strong> é intenso e misterioso." },
      hint: "🎯 Sua fragrância diz muito antes de você falar qualquer palavra.",
      options: [
        { icon: "🧊", text: "Fresco e confiante" },
        { icon: "🔥", text: "Intenso e marcante" },
        { icon: "🌿", text: "Natural e elegante" },
        { icon: "⚡", text: "Vibrante e moderno" },
      ]
    },
    {
      text: "Você prefere ter opções ou usar sempre a mesma fragrância?",
      obs: { title: "Sobre essa pergunta", text: "Quem gosta de variar ou tem diferentes momentos na rotina se beneficia muito do Kit Completo — três fragrâncias para cobrir cada situação sem precisar escolher só uma." },
      hint: "🧴 Isso vai definir se o Kit Completo é a escolha certa pra você.",
      options: [
        { icon: "🔄", text: "Gosto de variar conforme o humor" },
        { icon: "🎯", text: "Tenho minha fragrância preferida" },
        { icon: "📅", text: "Uma pra cada ocasião" },
        { icon: "🆕", text: "Gosto de experimentar novidades" },
      ]
    }
  ];

  let currentQ = 0;
  let selectedOption = null;

  function updateProgress(step, label) {
    const pct = step === 0 ? 0 : Math.round((step / (TOTAL + 1)) * 100);
    document.getElementById('progress-bar').style.width = pct + '%';
    const lbl = document.getElementById('progress-label');
    lbl.textContent = label;
    lbl.className = 'progress-label' + (pct > 50 ? '' : ' light');
  }

  function renderQuestion(index) {
    selectedOption = null;
    const q = questions[index];
    const isLast = index === TOTAL - 1;
    const app = document.getElementById('app');

    app.innerHTML = `
      <div class="banner">
        <div class="banner-glow"></div>
        <div class="banner-content">
          <span class="banner-icon">🧴</span>
          <div class="banner-title">Descubra seu<br>perfil olfativo</div>
          <div class="banner-sub">Responda ${TOTAL} perguntas rápidas e descubra qual combinação do Kit Body Man foi feita para você.</div>
        </div>
      </div>

      <div class="screen">
        <div class="question-block">
          <div class="question-step">Pergunta ${index + 1} de ${TOTAL}</div>
          <div class="question-text">${q.text}</div>
          <div class="question-obs">${q.hint}</div>
        </div>

        <div class="options-grid" id="options-grid">
          ${q.options.map((opt, i) => `
            <div class="option-btn" onclick="selectOpt(this, ${i})">
              <span class="opt-icon">${opt.icon}</span>
              <span class="opt-text">${opt.text}</span>
            </div>
          `).join('')}
        </div>

        <button class="btn-next" id="btn-next" onclick="${isLast ? 'showResult()' : `nextQuestion()`}">
          ${isLast ? 'Ver Meu Resultado →' : 'Próximo →'}
        </button>
        <button class="btn-obs" onclick="openObs()">ℹ️ Por que essa pergunta?</button>
      </div>
    `;

    // trigger animation
    const screen = app.querySelector('.screen');
    screen.style.opacity = '0';
    screen.style.transform = 'translateX(30px)';
    requestAnimationFrame(() => {
      screen.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
      screen.style.opacity = '1';
      screen.style.transform = 'translateX(0)';
    });

    updateProgress(index, `Calculando seu perfil: ${Math.round((index / (TOTAL + 1)) * 100)}%`);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function selectOpt(el, i) {
    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    selectedOption = i;
    document.getElementById('btn-next').classList.add('active');
  }

  function nextQuestion() {
    if (selectedOption === null) return;
    currentQ++;
    renderQuestion(currentQ);
  }

  function openObs() {
    const q = questions[currentQ];
    document.getElementById('obs-title').textContent = q.obs.title;
    document.getElementById('obs-text').innerHTML = q.obs.text;
    document.getElementById('obs-modal').classList.add('open');
  }

  function closeObs() {
    document.getElementById('obs-modal').classList.remove('open');
  }

  function showResult() {
    updateProgress(TOTAL + 1, 'Resultado pronto! 🎉');
    document.getElementById('progress-label').className = 'progress-label';

    const app = document.getElementById('app');
    app.innerHTML = `
      <div class="result-banner">
        <div class="confetti-row">🎉✨🏆✨🎉</div>
        <div class="result-title">Parabéns!</div>
        <div class="result-sub">Seu perfil olfativo foi identificado</div>
      </div>

      <div class="result-message">
        <p>⚠️ <strong>Nem todo homem chega até aqui.</strong> Você completou o teste e seu perfil mostra que valoriza presença, sofisticação e versatilidade. O acesso a essa oferta está sendo liberado apenas para quem realmente levou a sério.<br><br>
        <strong>A condição vai se manter enquanto o estoque durar. Aproveite.</strong></p>
      </div>

      <div class="result-kit">
        <div class="kit-label">Indicado para o seu perfil</div>
        <div class="kit-name">Kit Body Man Completo</div>
        <div class="kit-frags">Barbarius · Midtown · Enigma</div>
        <div class="kit-price-old">De R$129,90</div>
        <div class="kit-price"><span>R$</span>56,90</div>
        <div class="kit-install">3x de R$18,97 sem juros · ou 12x com juros</div>
      </div>

      <a href="https://primacialclub.vercel.app/" class="btn-buy">
